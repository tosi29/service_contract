{% extends "base.html" %}
{% block content %}
<h1>契約状態一覧</h1>
<table>
  <thead>
    <tr>
      <th>Contract ID</th>
      <th>State</th>
      <th>Plan</th>
      <th>Budget</th>
      <th>Team</th>
      <th>API Key</th>
      <th>Started</th>
      <th>Ended</th>
      <th>Updated</th>
    </tr>
  </thead>
  <tbody>
    {% for row in contracts %}
    <tr>
      <td>{{ row[0] }}</td>
      <td>{{ row[1] }}</td>
      <td>{{ row[2] }}</td>
      <td>{{ row[3] }}</td>
      <td>{{ row[4] }}</td>
      <td>{{ row[5] }}</td>
      <td>{{ row[6] }}</td>
      <td>{{ row[7] }}</td>
      <td>{{ row[8] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
