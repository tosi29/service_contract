<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Contract</title>
    <style>
      body { font-family: sans-serif; margin: 24px; }
      nav a { margin-right: 16px; }
      table { border-collapse: collapse; width: 100%; margin-top: 16px; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 14px; }
      th { background: #f3f3f3; }
      .message { margin: 12px 0; color: #0a5; }
      .error { margin: 12px 0; color: #a00; }
      form { margin-top: 16px; }
      input, select, textarea, button { width: 100%; max-width: 720px; margin: 6px 0; padding: 8px; }
      .inline { display: flex; gap: 8px; align-items: end; }
      .inline input, .inline button { width: auto; }
    </style>
  </head>
  <body>
    <nav>
      <a href="/contracts">契約一覧</a>
      <a href="/events/new">イベント登録</a>
      <a href="/usage/import">利用実績取込</a>
      <a href="/invoices">請求一覧</a>
      <a href="/export/contracts.csv">契約CSV</a>
      <a href="/export/contracts.xlsx">契約Excel</a>
    </nav>
    {% if message %}
      {% if message.startswith("error:") %}
      <div class="error">{{ message }}</div>
      {% else %}
      <div class="message">{{ message }}</div>
      {% endif %}
    {% endif %}
    {% block content %}{% endblock %}
  </body>
</html>
